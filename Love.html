<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Morning, Divay 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

   .hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

   .heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      animation: float 6s ease-in infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

   .container {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      max-width: 500px;
      width: 100%;
      z-index: 10;
      position: relative;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      color: #d63384;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

   .subtitle {
      color: #6f42c1;
      margin-bottom: 30px;
      font-weight: 300;
    }

   .message-box {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 25px;
      margin: 25px 0;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #495057;
      line-height: 1.6;
      transition: all 0.3s ease;
    }

   .btn {
      background: linear-gradient(45deg, #ff6b9d, #c44569);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      margin: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
    }

   .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 157, 0.6);
    }

   .btn-music {
      background: linear-gradient(45deg, #a55eea, #8854d0);
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 15px;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
     .container { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <button class="btn btn-music" id="musicBtn">🎵 Play Music</button>

  <div class="hearts" id="hearts"></div>

  <div class="container">
    <h1>Good Morning, Divay</h1>
    <p class="subtitle">Your daily dose of love 💕</p>

    <div class="message-box" id="message">
      Click "New Line" for your good morning message, Divay ✨
    </div>

    <button class="btn" onclick="newMessage()">✨ New Line</button>
    <button class="btn" onclick="copyMessage()">📋 Copy</button>
    <button class="btn" onclick="shareMessage()">💌 Share</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
  </audio>

  <script>
    const messages = [
      "Good morning, Divay 🌅 Your smile is my sunrise, and your love is my light.",
      "Wake up my king, Divay 💖 The world is lucky to have you in it today.",
      "Rise and shine, Divay ✨ I dreamt of you all night, and now I get to live that dream.",
      "Good morning, Divay 🌸 You're the first thought in my heart every single day.",
      "Hey Divay ☀️ Just a reminder that you are loved, cherished, and my everything.",
      "Morning, Divay 💕 Coffee tastes better when I'm thinking of you.",
      "Divay, you + morning = perfection 🌈 Have the most beautiful day, my love.",
      "Good morning to the boy who owns my heart, Divay 💝",
      "Wake up Divay 🌹 The stars might be gone, but you still light up my world.",
      "Divay, every morning with you in my life is a blessing 🌻 Good morning!"
    ];

    let currentMsg = "";

    function newMessage() {
      const randomIndex = Math.floor(Math.random() * messages.length);
      currentMsg = messages[randomIndex];
      document.getElementById('message').innerText = currentMsg;
    }

    function copyMessage() {
      if (!currentMsg) newMessage();
      navigator.clipboard.writeText(currentMsg);
      alert('Copied! Send it to Divay 💕');
    }

    function shareMessage() {
      if (!currentMsg) newMessage();
      if (navigator.share) {
        navigator.share({ text: currentMsg });
      } else {
        copyMessage();
      }
    }

    // Music toggle
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let isPlaying = false;

    musicBtn.onclick = () => {
      if (isPlaying) {
        music.pause();
        musicBtn.innerText = '🎵 Play Music';
      } else {
        music.play();
        musicBtn.innerText = '⏸️ Pause Music';
      }
      isPlaying =!isPlaying;
    };

    // Floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerText = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 3 + 3 + 's';
      document.getElementById('hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHeart, 800);
    newMessage(); // Load first message
  </script>
</body>
</html>
