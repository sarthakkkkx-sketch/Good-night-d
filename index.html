<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Night, Divay</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #f1f1f1;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      flex-direction: column;
    }
    .moon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #fff, 0 0 20px #a7c7e7; }
      to { text-shadow: 0 0 20px #fff, 0 0 30px #d6eaff; }
    }
    .message {
      max-width: 600px;
      padding: 0 20px;
      line-height: 1.6;
      font-size: 1.2rem;
      margin-bottom: 2rem;
    }
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      z-index: -1;
    }
    .btn {
      background: #25D366;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      margin: 8px;
      transition: 0.3s;
    }
    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    .music-btn {
      background: #ffffff20;
      border: 1px solid #ffffff40;
    }
    .controls {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div>
    <div class="moon">🌙</div>
    <h1>Good Night, Divay</h1>
    <p class="message">
      Rest easy and let all the noise of the day fade out. 
      Hope you wake up feeling lighter, with your mind clear and your heart calm. 
      Sleep well and dream big.
    </p>
    
    <div class="controls">
      <button class="btn music-btn" id="musicBtn">▶️ Play Calm Music</button>
      <button class="btn" id="whatsappBtn">Share on WhatsApp</button>
    </div>
  </div>

  <!-- Calm background music - using a royalty free link -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    Your browser doesn't support audio.
  </audio>

  <script>
    // Stars
    const starsContainer = document.getElementById('stars');
    for(let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.style.position = 'absolute';
      star.style.width = '2px';
      star.style.height = '2px';
      star.style.background = 'white';
      star.style.borderRadius = '50%';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.opacity = Math.random();
      star.style.animation = `twinkle ${2 + Math.random() * 3}s infinite`;
      starsContainer.appendChild(star);
    }
    
    // Add twinkle animation
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes twinkle {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
    `;
    document.head.appendChild(style);

    // Music control
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let isPlaying = false;
    
    musicBtn.addEventListener('click', () => {
      if(isPlaying) {
        music.pause();
        musicBtn.innerHTML = '▶️ Play Calm Music';
      } else {
        music.play();
        musicBtn.innerHTML = '⏸️ Pause Music';
      }
      isPlaying = !isPlaying;
    });

    // WhatsApp share
    const whatsappBtn = document.getElementById('whatsappBtn');
    whatsappBtn.addEventListener('click', () => {
      const text = `Good Night, Divay 🌙%0A%0ARest easy and let all the noise of the day fade out. Hope you wake up feeling lighter, with your mind clear and your heart calm. Sleep well and dream big.%0A%0ASent with 💙`;
      const url = `https://wa.me/?text=${text}`;
      window.open(url, '_blank');
    });
  </script>
</body>
  </html>
